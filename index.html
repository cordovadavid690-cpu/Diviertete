<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let message="";
let messageTimer=0;
let score=0;
let gameWon=false;
let fireworks=[];

let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:0.9,jump:-17,grounded:false
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetPlayer(text="Tú puedes corazón 💕 Inténtalo otra vez"){
player.x=100;
player.y=300;
player.dy=0;
cameraX=0;
message=text;
messageTimer=120;
}

let platforms=[
{x:0,y:550,w:200,h:20},
{x:350,y:480,w:150,h:20},
{x:650,y:420,w:120,h:20},
{x:900,y:360,w:120,h:20},
{x:1150,y:300,w:120,h:20},
{x:1400,y:450,w:150,h:20},
{x:1750,y:380,w:150,h:20},
{x:2100,y:320,w:150,h:20},
{x:2500,y:550,w:400,h:20}
];

let spikes=[
{x:500,y:530,w:40,h:20},
{x:1000,y:530,w:40,h:20},
{x:1600,y:530,w:40,h:20}
];

let mice=[
{x:800,y:390,dir:1},
{x:1850,y:350,dir:-1}
];

let hearts=[
{x:700,y:350,got:false},
{x:1300,y:250,got:false},
{x:2000,y:280,got:false}
];

let portal={x:2650,y:470,r:40};

function update(){

if(gameWon) return;

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=6;
if(keys["ArrowLeft"]) player.x-=6;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y < p.y+p.h &&
   player.y+player.height > p.y){
player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height) resetPlayer();

// pinchos
spikes.forEach(s=>{
if(player.x < s.x+s.w &&
   player.x+player.width > s.x &&
   player.y+player.height > s.y){
resetPlayer("El amor requiere valentía 💔 pero tú puedes");
}
});

// ratones
mice.forEach(m=>{
m.x+=2*m.dir;
if(m.x<700||m.x>900) m.dir*=-1;

if(player.x < m.x+30 &&
   player.x+player.width > m.x &&
   player.y < m.y+20 &&
   player.y+player.height > m.y){
resetPlayer("Los obstáculos no pueden contra nosotros 🐭");
}
});

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x < h.x+20 &&
player.x+player.width > h.x &&
player.y < h.y+20 &&
player.y+player.height > h.y){
h.got=true;
score++;
message="Te quiero muchísimo ❤️";
messageTimer=60;
}
});

// portal final
let dx=player.x-portal.x;
let dy=player.y-portal.y;
if(Math.sqrt(dx*dx+dy*dy)<portal.r){
gameWon=true;
startFireworks();
}

cameraX=player.x-200;
if(messageTimer>0) messageTimer--;
}

function drawCat(x,y){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(x+20,y+20,20,0,Math.PI*2);
ctx.fill();
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// estrellas
ctx.fillStyle="white";
for(let i=0;i<200;i++){
ctx.fillRect((i*300)%4000-cameraX*0.3,Math.random()*300,2,2);
}

// plataformas
ctx.fillStyle="#e74c3c";
platforms.forEach(p=>ctx.fillRect(p.x-cameraX,p.y,p.w,p.h));

// pinchos
ctx.fillStyle="silver";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x-cameraX,s.y);
ctx.lineTo(s.x+20-cameraX,s.y-20);
ctx.lineTo(s.x+40-cameraX,s.y);
ctx.fill();
});

// ratones
ctx.fillStyle="gray";
mice.forEach(m=>ctx.fillRect(m.x-cameraX,m.y,30,20));

// corazones
ctx.fillStyle="pink";
hearts.forEach(h=>{
if(!h.got){
ctx.beginPath();
ctx.arc(h.x-cameraX,h.y,8,0,Math.PI*2);
ctx.fill();
}
});

// portal corazón
ctx.fillStyle="pink";
ctx.beginPath();
ctx.arc(portal.x-cameraX,portal.y,portal.r,0,Math.PI*2);
ctx.fill();

drawCat(player.x-cameraX,player.y);

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("❤️ x "+score,20,40);

if(messageTimer>0){
ctx.font="24px Arial";
ctx.fillText(message,canvas.width/2-250,100);
}

if(gameWon){
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("Eres lo más hermoso que la vida me regaló,",canvas.width/2-400,canvas.height/2);
ctx.fillText("mi casualidad favorita, mi destino perfecto ❤️",canvas.width/2-400,canvas.height/2+50);
drawFireworks();
}
}

function startFireworks(){
for(let i=0;i<50;i++){
fireworks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
r:Math.random()*3+2
});
}
}

function drawFireworks(){
ctx.fillStyle="gold";
fireworks.forEach(f=>{
ctx.beginPath();
ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
ctx.fill();
});
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
