<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let gameWon=false;
let message="";
let messageTimer=0;
let usedMessages=[];

let phrases=[
"Eres mi sueño más bonito ❤️",
"Mi lugar favorito es contigo 💕",
"Eres mi casualidad perfecta ✨",
"Tu sonrisa ilumina mi mundo 🌙",
"Contigo todo tiene sentido 💖",
"Te elegiría siempre 🥰",
"Eres mi paz en el caos 🌌",
"Mi corazón corre hacia ti 💘",
"Amarte es mi aventura favorita 💞",
"Eres lo mejor que me pasó ❤️",
"Mi futuro tiene tu nombre 💍",
"Tu voz es mi melodía favorita 🎶",
"Mi hogar está donde estés tú 🏡",
"Te pienso más de lo que imaginas 💭",
"Tu abrazo sería mi lugar seguro 🤍",
"Eres mi milagro diario ✨",
"Si volviera a nacer, te elegiría otra vez 💘",
"Amarte es mi destino 🌠",
"Eres mi siempre favorito 💓"
];

function getRandomPhrase(){
if(usedMessages.length===phrases.length) usedMessages=[];
let available=phrases.filter(p=>!usedMessages.includes(p));
let random=available[Math.floor(Math.random()*available.length)];
usedMessages.push(random);
return random;
}

let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:1.2,jump:-20,grounded:false
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetPlayer(){
player.x=100;
player.y=300;
player.dy=0;
message="Tú puedes corazón, inténtalo de nuevo 💕";
messageTimer=150;
}

let platforms=[];
let spikes=[];
let mice=[];
let hearts=[];
let xPos=0;

// NIVEL MÁS DIFÍCIL
for(let i=0;i<35;i++){

let y=450+Math.sin(i)*120;

platforms.push({x:xPos,y:y,w:120,h:20});

// pinchos
if(i%2===0 && i!==0){
spikes.push({x:xPos+30,y:y-20,w:60,h:20});
}

// ratones enemigos
if(i%5===0 && i!==0){
mice.push({x:xPos+40,y:y-20,w:30,h:20,dir:1,min:xPos+20,max:xPos+80});
}

// corazones físicos
if(i%3===0){
hearts.push({x:xPos+50,y:y-40,size:14,got:false});
}

xPos+=200;
}

let portal={x:xPos-150,y:350,size:40,phase:0};

// estrellas animadas
let stars=[];
for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*300,
speed:0.3+Math.random()*0.7,
phase:Math.random()*6.28
});
}

function update(){

if(gameWon) return;

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=7;
if(keys["ArrowLeft"]) player.x-=7;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y+player.height <= p.y+20 &&
   player.y+player.height+player.dy >= p.y){
player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height) resetPlayer();

// pinchos
spikes.forEach(s=>{
if(player.x+player.width > s.x &&
   player.x < s.x+s.w &&
   player.y+player.height > s.y &&
   player.y < s.y+s.h){
resetPlayer();
}
});

// ratones
mice.forEach(m=>{
m.x+=m.dir*2;
if(m.x<m.min||m.x>m.max) m.dir*=-1;

if(player.x+player.width > m.x &&
   player.x < m.x+m.w &&
   player.y+player.height > m.y &&
   player.y < m.y+m.h){
resetPlayer();
}
});

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x+player.width > h.x &&
player.x < h.x+h.size &&
player.y+player.height > h.y &&
player.y < h.y+h.size){
h.got=true;
message=getRandomPhrase();
messageTimer=150;
}
});

// portal
if(player.x+player.width > portal.x &&
   player.x < portal.x+portal.size &&
   player.y+player.height > portal.y &&
   player.y < portal.y+portal.size){
gameWon=true;
}

portal.phase+=0.05;

stars.forEach(st=>{
st.x-=st.speed;
if(st.x<0) st.x=canvas.width;
st.phase+=0.02;
});

cameraX=player.x-200;
if(messageTimer>0) messageTimer--;
}

function drawHeart(x,y,size,color){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size*1.5);
ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
ctx.fillStyle=color;
ctx.fill();
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// estrellas
stars.forEach(st=>{
let r=150+100*Math.sin(st.phase);
let g=150+100*Math.sin(st.phase+2);
let b=255;
ctx.fillStyle=`rgb(${r},${g},${b})`;
ctx.fillRect(st.x,st.y,3,3);
});

// plataformas
ctx.fillStyle="#e74c3c";
platforms.forEach(p=>ctx.fillRect(p.x-cameraX,p.y,p.w,p.h));

// pinchos
ctx.fillStyle="silver";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x-cameraX,s.y+s.h);
ctx.lineTo(s.x+s.w/2-cameraX,s.y);
ctx.lineTo(s.x+s.w-cameraX,s.y+s.h);
ctx.fill();
});

// ratones
ctx.fillStyle="gray";
mice.forEach(m=>{
ctx.fillRect(m.x-cameraX,m.y,m.w,m.h);
});

// corazones
hearts.forEach(h=>{
if(!h.got){
drawHeart(h.x-cameraX,h.y,h.size,"red");
}
});

// portal corazón
let r=200+55*Math.sin(portal.phase);
let g=50+50*Math.sin(portal.phase+2);
let b=200+55*Math.sin(portal.phase+4);
drawHeart(portal.x-cameraX,portal.y,portal.size,`rgb(${r},${g},${b})`);

// jugador
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-cameraX+20,player.y+20,20,0,Math.PI*2);
ctx.fill();

// mensajes
if(messageTimer>0){
ctx.fillStyle="white";
ctx.font="24px Arial";
ctx.fillText(message,canvas.width/2-450,100);
}

if(gameWon){
ctx.font="38px Arial";
ctx.fillText("Nivel superado 💖",
canvas.width/2-200,canvas.height/2);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
