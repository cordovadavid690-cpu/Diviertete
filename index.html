<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
#ui{
position:absolute;top:20px;left:50%;transform:translateX(-50%);
color:white;font-family:Arial;text-align:center;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cameraX=0;
let message="";
let messageTimer=0;
let score=0;

let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:0.8,jump:-15,grounded:false
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let platforms=[
{x:0,y:500,w:300,h:20},
{x:350,y:450,w:150,h:20},
{x:550,y:400,w:150,h:20},
{x:750,y:350,w:150,h:20},
{x:950,y:300,w:150,h:20},
{x:1200,y:450,w:200,h:20},
{x:1500,y:400,w:200,h:20},
{x:1800,y:350,w:200,h:20},
{x:2100,y:500,w:400,h:20}
];

let hearts=[
{x:380,y:400,got:false},
{x:780,y:300,got:false},
{x:1250,y:350,got:false},
{x:1700,y:300,got:false},
{x:2200,y:450,got:false}
];

let checkpoints=[
{x:500,text:"Eres mi lugar favorito 💖",used:false},
{x:900,text:"Contigo todo tiene sentido ✨",used:false},
{x:1300,text:"Tu sonrisa es mi meta 🥰",used:false},
{x:1800,text:"Eres mi calma y mi aventura 🌙",used:false},
{x:2300,text:"Siempre elegiría correr hacia ti ❤️",used:false}
];

function resetPlayer(){
player.x=100;
player.y=300;
player.dy=0;
cameraX=0;
message="Tú puedes corazón, inténtalo de nuevo 💕";
messageTimer=120;
}

function update(){

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=5;
if(keys["ArrowLeft"]) player.x-=5;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y < p.y+p.h &&
   player.y+player.height > p.y){
player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height){
resetPlayer();
}

cameraX=player.x-200;

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x < h.x+20 &&
player.x+player.width > h.x &&
player.y < h.y+20 &&
player.y+player.height > h.y){
h.got=true;
score++;
message="Te quiero mucho ❤️";
messageTimer=60;
}
});

// checkpoints
checkpoints.forEach(c=>{
if(!c.used && player.x>c.x){
c.used=true;
message=c.text;
messageTimer=150;
}
});

if(messageTimer>0) messageTimer--;
}

function drawCat(x,y){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(x+20,y+20,20,0,Math.PI*2);
ctx.fill();

// orejas
ctx.beginPath();
ctx.moveTo(x+5,y+10);
ctx.lineTo(x+15,y-10);
ctx.lineTo(x+25,y+10);
ctx.fill();

ctx.beginPath();
ctx.moveTo(x+35,y+10);
ctx.lineTo(x+45,y-10);
ctx.lineTo(x+55,y+10);
ctx.fill();
}

function drawStars(){
ctx.fillStyle="white";
for(let i=0;i<150;i++){
ctx.fillRect((i*200)%3000-cameraX*0.3,Math.random()*300,2,2);
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawStars();

platforms.forEach(p=>{
ctx.fillStyle="#e74c3c";
ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
});

// corazones
hearts.forEach(h=>{
if(!h.got){
ctx.fillStyle="pink";
ctx.beginPath();
ctx.arc(h.x-cameraX,h.y,8,0,Math.PI*2);
ctx.fill();
}
});

drawCat(player.x-cameraX,player.y);

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("❤️ x "+score,20,40);

if(messageTimer>0){
ctx.font="28px Arial";
ctx.fillText(message,canvas.width/2-200,100);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
