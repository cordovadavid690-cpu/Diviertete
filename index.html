<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let score=0;
let gameWon=false;
let message="";
let messageTimer=0;

let heartMessages=[
"Eres mi sueño más bonito ❤️",
"Mi lugar favorito es contigo 💕",
"Eres mi casualidad perfecta ✨",
"Tu sonrisa ilumina mi mundo 🌙",
"Contigo todo tiene sentido 💖",
"Te elegiría siempre 🥰",
"Eres mi paz en el caos 🌌",
"Mi corazón corre hacia ti 💘",
"Amarte es mi aventura favorita 💞",
"Eres lo mejor que me pasó ❤️"
];

let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:1,jump:-18,grounded:false
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetPlayer(){
player.x=100;
player.y=300;
player.dy=0;
message="Tú puedes corazón, inténtalo de nuevo 💕";
messageTimer=120;
}

let platforms=[];
let spikes=[];
let xPos=0;

for(let i=0;i<25;i++){
let y=400+Math.sin(i)*100;
platforms.push({x:xPos,y:y,w:120,h:20});

// agregar pinchos sobre algunas bases
if(i%4===0 && i!==0){
spikes.push({x:xPos+40,y:y});
}

xPos+=220;
}

let hearts=[];
for(let i=0;i<10;i++){
hearts.push({
x:600+i*400,
y:250+Math.random()*150,
got:false,
text:heartMessages[i]
});
}

let portal={x:xPos+200,y:300,size:50,colorPhase:0};

function update(){

if(gameWon) return;

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=6;
if(keys["ArrowLeft"]) player.x-=6;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y < p.y+p.h &&
   player.y+player.height > p.y){
player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height) resetPlayer();

// pinchos
spikes.forEach(s=>{
if(player.x+20 > s.x && player.x+20 < s.x+40 &&
   player.y+player.height > s.y){
resetPlayer();
}
});

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x < h.x+20 &&
player.x+player.width > h.x &&
player.y < h.y+20 &&
player.y+player.height > h.y){
h.got=true;
score++;
message=h.text;
messageTimer=120;
}
});

// portal
if(Math.abs(player.x-portal.x)<40 && Math.abs(player.y-portal.y)<40){
gameWon=true;
}

portal.colorPhase+=0.05;
cameraX=player.x-200;
if(messageTimer>0) messageTimer--;
}

function drawStar(x,y){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);
ctx.fill();
}

function drawHeart(x,y,size,color){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size*1.5);
ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
ctx.fillStyle=color;
ctx.fill();
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// estrellas formando corazones
for(let i=0;i<50;i++){
let t=i/50*Math.PI*2;
let x=300+100*(16*Math.pow(Math.sin(t),3));
let y=150-100*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
drawStar(x-cameraX*0.1,y);
}

// plataformas
ctx.fillStyle="#e74c3c";
platforms.forEach(p=>ctx.fillRect(p.x-cameraX,p.y,p.w,p.h));

// pinchos
ctx.fillStyle="silver";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x-cameraX,s.y);
ctx.lineTo(s.x+20-cameraX,s.y-20);
ctx.lineTo(s.x+40-cameraX,s.y);
ctx.fill();
});

// corazones
hearts.forEach(h=>{
if(!h.got){
drawHeart(h.x-cameraX,h.y,10,"pink");
}
});

// portal animado colores amor
let r=128+127*Math.sin(portal.colorPhase);
let g=50+50*Math.sin(portal.colorPhase+2);
let b=150+100*Math.sin(portal.colorPhase+4);
let color=`rgb(${r},${g},${b})`;

drawHeart(portal.x-cameraX,portal.y,portal.size,color);

// gato
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-cameraX+20,player.y+20,20,0,Math.PI*2);
ctx.fill();

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("❤️ x "+score,20,40);

if(messageTimer>0){
ctx.font="26px Arial";
ctx.fillText(message,canvas.width/2-400,100);
}

if(gameWon){
ctx.font="38px Arial";
ctx.fillText("Eres lo más hermoso que la vida me regaló,",canvas.width/2-450,canvas.height/2);
ctx.fillText("mi destino favorito, mi siempre, mi amor eterno ❤️",canvas.width/2-450,canvas.height/2+50);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
