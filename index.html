<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let score=0;
let gameWon=false;
let message="";
let messageTimer=0;

let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:1,jump:-18,grounded:false
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetPlayer(){
player.x=100;
player.y=300;
player.dy=0;
message="Tú puedes corazón, inténtalo de nuevo 💕";
messageTimer=120;
}

let platforms=[];
let spikes=[];
let candles=[];
let xPos=0;

for(let i=0;i<25;i++){
let y=450+Math.sin(i)*80;
platforms.push({x:xPos,y:y,w:150,h:20});

// pinchos encima de plataforma
if(i%4===0 && i!==0){
spikes.push({x:xPos+55,y:y-20,w:40,h:20});
}

// velas románticas
if(i%5===0){
candles.push({x:xPos+20,y:y-25});
candles.push({x:xPos+100,y:y-25});
}

xPos+=220;
}

let hearts=[];
let heartTexts=[
"Eres mi sueño más bonito ❤️",
"Mi lugar favorito es contigo 💕",
"Eres mi casualidad perfecta ✨",
"Tu sonrisa ilumina mi mundo 🌙",
"Contigo todo tiene sentido 💖",
"Te elegiría siempre 🥰",
"Eres mi paz en el caos 🌌",
"Mi corazón corre hacia ti 💘",
"Amarte es mi aventura favorita 💞",
"Eres lo mejor que me pasó ❤️"
];

for(let i=0;i<10;i++){
hearts.push({
x:500+i*350,
y:300,
got:false,
text:heartTexts[i]
});
}

// portal MÁS CERCA y alcanzable
let portal={x:xPos-200,y:350,size:40,phase:0};

function update(){

if(gameWon) return;

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=6;
if(keys["ArrowLeft"]) player.x-=6;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y+player.height <= p.y+20 &&
   player.y+player.height+player.dy >= p.y){
player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height) resetPlayer();

// COLISION REAL DE PINCHOS
spikes.forEach(s=>{
if(player.x+player.width > s.x &&
   player.x < s.x+s.w &&
   player.y+player.height > s.y &&
   player.y < s.y+s.h){
resetPlayer();
}
});

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x < h.x+20 &&
player.x+player.width > h.x &&
player.y < h.y+20 &&
player.y+player.height > h.y){
h.got=true;
score++;
message=h.text;
messageTimer=120;
}
});

// portal
if(player.x+player.width > portal.x &&
   player.x < portal.x+40 &&
   player.y+player.height > portal.y &&
   player.y < portal.y+40){
gameWon=true;
}

portal.phase+=0.05;
cameraX=player.x-200;
if(messageTimer>0) messageTimer--;
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// ⭐ ESTRELLAS REALES POR TODO EL CIELO
ctx.fillStyle="white";
for(let i=0;i<150;i++){
let x=(i*97)%canvas.width;
let y=(i*53)%300;
ctx.fillRect(x,y,2,2);
}

// plataformas
ctx.fillStyle="#e74c3c";
platforms.forEach(p=>ctx.fillRect(p.x-cameraX,p.y,p.w,p.h));

// pinchos
ctx.fillStyle="silver";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x-cameraX,s.y+s.h);
ctx.lineTo(s.x+s.w/2-cameraX,s.y);
ctx.lineTo(s.x+s.w-cameraX,s.y+s.h);
ctx.fill();
});

// velas románticas
candles.forEach(c=>{
// base
ctx.fillStyle="#fff";
ctx.fillRect(c.x-cameraX,c.y,6,20);

// llama animada
let flameSize=8+Math.sin(Date.now()/200)*2;
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(c.x-cameraX+3,c.y-5,flameSize/2,0,Math.PI*2);
ctx.fill();
});

// corazones
hearts.forEach(h=>{
if(!h.got){
ctx.fillStyle="pink";
ctx.beginPath();
ctx.arc(h.x-cameraX,h.y,8,0,Math.PI*2);
ctx.fill();
}
});

// portal corazón animado
let r=150+100*Math.sin(portal.phase);
let g=50+50*Math.sin(portal.phase+2);
let b=200+55*Math.sin(portal.phase+4);
ctx.fillStyle=`rgb(${r},${g},${b})`;

ctx.beginPath();
ctx.arc(portal.x-cameraX,portal.y,portal.size,0,Math.PI*2);
ctx.fill();

// gato
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-cameraX+20,player.y+20,20,0,Math.PI*2);
ctx.fill();

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("❤️ x "+score,20,40);

if(messageTimer>0){
ctx.font="26px Arial";
ctx.fillText(message,canvas.width/2-400,100);
}

if(gameWon){
ctx.font="38px Arial";
ctx.fillText("Eres lo más hermoso que la vida me regaló ❤️",
canvas.width/2-450,canvas.height/2);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
