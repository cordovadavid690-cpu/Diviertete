<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let gameWon=false;
let message="";
let messageTimer=0;
let usedPhrases=[];

// -------- FRASES (150 únicas) --------
const subjects=["Tu sonrisa","Tu mirada","Tu voz","Tu risa","Tu ternura","Tu forma de amar","Tu energía","Tu presencia","Tu dulzura","Tu corazón"];
const feelings=["ilumina mi mundo","me da paz","me hace fuerte","me llena de amor","me inspira cada día","me hace soñar","es mi refugio","es mi alegría eterna","me cambia la vida","es mi destino"];
const endings=["cada segundo 💖","para siempre 💕","sin límites ✨","como un milagro 🌙","más de lo que imaginas 💫","hasta el infinito 💘","con todo mi corazón ❤️","en cada latido 💓","en cada pensamiento 💭","sin condición 💞"];

function generatePhrases(){
let list=[];
subjects.forEach(s=>{
feelings.forEach(f=>{
endings.forEach(e=>{
list.push(`${s} ${f} ${e}`);
});
});
});
return list.slice(0,150);
}

let phrases=generatePhrases();

function getRandomPhrase(){
if(usedPhrases.length===phrases.length) usedPhrases=[];
let available=phrases.filter(p=>!usedPhrases.includes(p));
let random=available[Math.floor(Math.random()*available.length)];
usedPhrases.push(random);
return random;
}

// -------- JUGADOR --------
let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:1.2,jump:-20,grounded:false,
lastPlatform:-1
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetPlayer(){
player.x=100;
player.y=300;
player.dy=0;
message="Tú puedes corazón, inténtalo de nuevo 💕";
messageTimer=160;
}

// -------- OBJETOS --------
let platforms=[];
let mice=[];
let hearts=[];
let candles=[];
let xPos=0;

for(let i=0;i<75;i++){

let y=450+Math.sin(i)*100;
platforms.push({x:xPos,y:y,w:140,h:20,id:i});

if(i%8===0 && i!==0){
mice.push({x:xPos+50,y:y-20,w:30,h:20,dir:1,min:xPos+30,max:xPos+90});
}

if(i%4===0){
hearts.push({x:xPos+60,y:y-40,size:14,got:false});
}

if(i%3===0){
candles.push({x:xPos+15,y:y-25});
candles.push({x:xPos+110,y:y-25});
}

xPos+=180; // saltos más cortos = más fácil
}

let portal={x:xPos-200,y:350,size:40,phase:0};

// -------- ESTRELLAS --------
let stars=[];
for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*300,
speed:0.3+Math.random()*0.7,
phase:Math.random()*6.28
});
}

// -------- UPDATE --------
function update(){

if(gameWon) return;

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=6;
if(keys["ArrowLeft"]) player.x-=6;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y+player.height <= p.y+20 &&
   player.y+player.height+player.dy >= p.y){

if(player.lastPlatform!==p.id){
message=getRandomPhrase();
messageTimer=120;
player.lastPlatform=p.id;
}

player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height) resetPlayer();

// ratones (más lentos)
mice.forEach(m=>{
m.x+=m.dir*1.5;
if(m.x<m.min||m.x>m.max) m.dir*=-1;

if(player.x+player.width > m.x &&
   player.x < m.x+m.w &&
   player.y+player.height > m.y &&
   player.y < m.y+m.h){
resetPlayer();
}
});

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x+player.width > h.x &&
player.x < h.x+h.size &&
player.y+player.height > h.y &&
player.y < h.y+h.size){
h.got=true;
message="Te quiero mucho mi suki 💕";
messageTimer=150;
}
});

// portal
if(player.x+player.width > portal.x &&
   player.x < portal.x+portal.size &&
   player.y+player.height > portal.y &&
   player.y < portal.y+portal.size){
gameWon=true;
}

portal.phase+=0.05;

stars.forEach(st=>{
st.x-=st.speed;
if(st.x<0) st.x=canvas.width;
st.phase+=0.02;
});

cameraX=player.x-200;
if(messageTimer>0) messageTimer--;
}

// -------- DIBUJO --------
function drawHeart(x,y,size,color){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size*1.5);
ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
ctx.fillStyle=color;
ctx.fill();
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// estrellas
stars.forEach(st=>{
let r=150+100*Math.sin(st.phase);
let g=150+100*Math.sin(st.phase+2);
let b=255;
ctx.fillStyle=`rgb(${r},${g},${b})`;
ctx.fillRect(st.x,st.y,3,3);
});

// plataformas
ctx.fillStyle="#e74c3c";
platforms.forEach(p=>ctx.fillRect(p.x-cameraX,p.y,p.w,p.h));

// velas
candles.forEach(c=>{
ctx.fillStyle="#fff";
ctx.fillRect(c.x-cameraX,c.y,6,20);
let flame=8+Math.sin(Date.now()/200)*2;
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(c.x-cameraX+3,c.y-5,flame/2,0,Math.PI*2);
ctx.fill();
});

// ratones
ctx.fillStyle="gray";
mice.forEach(m=>{
ctx.fillRect(m.x-cameraX,m.y,m.w,m.h);
});

// corazones
hearts.forEach(h=>{
if(!h.got){
drawHeart(h.x-cameraX,h.y,h.size,"red");
}
});

// portal
let r=200+55*Math.sin(portal.phase);
let g=50+50*Math.sin(portal.phase+2);
let b=200+55*Math.sin(portal.phase+4);
drawHeart(portal.x-cameraX,portal.y,portal.size,`rgb(${r},${g},${b})`);

// jugador
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-cameraX+20,player.y+20,20,0,Math.PI*2);
ctx.fill();

// mensaje
if(messageTimer>0){
ctx.fillStyle="white";
ctx.font="22px Arial";
ctx.fillText(message,canvas.width/2-450,100);
}

if(gameWon){
ctx.font="36px Arial";
ctx.fillText("Eres mi destino favorito 💖",
canvas.width/2-250,canvas.height/2);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
