<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corre Gatito 💖</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f2c;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let cameraX=0;
let score=0;
let gameWon=false;
let message="";
let messageTimer=0;

let lovePhrases=[
"Eres mi pensamiento favorito cada día 💕",
"Si el mundo se apagara, tú serías mi luz ✨",
"Contigo todo tiene sentido ❤️",
"Eres mi lugar seguro 🌙",
"Te elegiría en todas mis vidas 💖",
"Tu sonrisa es mi paz 🥰",
"Mi casualidad favorita fue encontrarte 💫",
"Si correr hacia ti es difícil, lo haría mil veces",
"Eres el sueño que no sabía que tenía",
"Amarte es lo más real que me ha pasado ❤️"
];

function randomPhrase(){
message=lovePhrases[Math.floor(Math.random()*lovePhrases.length)];
messageTimer=120;
}

let player={
x:100,y:300,width:40,height:40,
dy:0,gravity:1,jump:-18,grounded:false
};

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetPlayer(){
player.x=100;
player.y=300;
player.dy=0;
randomPhrase();
}

let platforms=[];
let xPos=0;
for(let i=0;i<25;i++){
platforms.push({
x:xPos,
y:400+Math.sin(i)*100,
w:120,
h:20
});
xPos+=200+Math.random()*100;
}

let spikes=[
{x:600,y:550},{x:1200,y:550},{x:2000,y:550},{x:2800,y:550}
];

let mice=[
{x:900,y:350,dir:1},
{x:1700,y:350,dir:-1},
{x:2500,y:350,dir:1}
];

let hearts=[];
for(let i=1;i<=10;i++){
hearts.push({x:500*i,y:250+Math.random()*100,got:false});
}

let portal={x:xPos+200,y:300,size:40};

function update(){

if(gameWon) return;

player.dy+=player.gravity;
player.y+=player.dy;

if(keys["ArrowRight"]) player.x+=6;
if(keys["ArrowLeft"]) player.x-=6;

player.grounded=false;

platforms.forEach(p=>{
if(player.x < p.x+p.w &&
   player.x+player.width > p.x &&
   player.y < p.y+p.h &&
   player.y+player.height > p.y){
player.y=p.y-player.height;
player.dy=0;
player.grounded=true;
}
});

if((keys[" "]||keys["ArrowUp"]) && player.grounded){
player.dy=player.jump;
}

if(player.y>canvas.height) resetPlayer();

// pinchos
spikes.forEach(s=>{
if(player.x > s.x-20 && player.x < s.x+20 && player.y+player.height>530){
resetPlayer();
}
});

// ratones
mice.forEach(m=>{
m.x+=2*m.dir;
if(m.x<700||m.x>m.x+200) m.dir*=-1;

if(player.x < m.x+30 &&
   player.x+player.width > m.x &&
   player.y < m.y+20 &&
   player.y+player.height > m.y){
resetPlayer();
}
});

// corazones
hearts.forEach(h=>{
if(!h.got &&
player.x < h.x+20 &&
player.x+player.width > h.x &&
player.y < h.y+20 &&
player.y+player.height > h.y){
h.got=true;
score++;
message="Te amo más de lo que las palabras pueden explicar ❤️";
messageTimer=80;
}
});

// portal corazón
if(Math.abs(player.x-portal.x)<40 && Math.abs(player.y-portal.y)<40){
gameWon=true;
}

cameraX=player.x-200;
if(messageTimer>0) messageTimer--;
}

function drawStar(cx,cy,spikes,outerRadius,innerRadius){
let rot=Math.PI/2*3;
let step=Math.PI/spikes;
ctx.beginPath();
ctx.moveTo(cx,cy-outerRadius);
for(let i=0;i<spikes;i++){
ctx.lineTo(cx+Math.cos(rot)*outerRadius,cy+Math.sin(rot)*outerRadius);
rot+=step;
ctx.lineTo(cx+Math.cos(rot)*innerRadius,cy+Math.sin(rot)*innerRadius);
rot+=step;
}
ctx.lineTo(cx,cy-outerRadius);
ctx.closePath();
ctx.fillStyle="white";
ctx.fill();
}

function drawHeart(x,y,size){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-size/2,x-size,y-size/2,x-size,y);
ctx.bezierCurveTo(x-size,y+size/2,x,y+size,x,y+size*1.5);
ctx.bezierCurveTo(x,y+size,x+size,y+size/2,x+size,y);
ctx.bezierCurveTo(x+size,y-size/2,x,y-size/2,x,y);
ctx.fillStyle="pink";
ctx.fill();
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// estrellas bonitas
for(let i=0;i<30;i++){
drawStar((i*300)%4000-cameraX*0.2,100+Math.sin(i)*50,5,8,4);
}

// plataformas
ctx.fillStyle="#e74c3c";
platforms.forEach(p=>ctx.fillRect(p.x-cameraX,p.y,p.w,p.h));

// pinchos
ctx.fillStyle="silver";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x-cameraX,550);
ctx.lineTo(s.x+20-cameraX,520);
ctx.lineTo(s.x+40-cameraX,550);
ctx.fill();
});

// ratones
ctx.fillStyle="gray";
mice.forEach(m=>ctx.fillRect(m.x-cameraX,m.y,30,20));

// corazones
hearts.forEach(h=>{
if(!h.got){
drawHeart(h.x-cameraX,h.y,10);
}
});

// portal final corazón
drawHeart(portal.x-cameraX,portal.y,40);

// gato
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x-cameraX+20,player.y+20,20,0,Math.PI*2);
ctx.fill();

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("❤️ x "+score,20,40);

if(messageTimer>0){
ctx.font="26px Arial";
ctx.fillText(message,canvas.width/2-400,100);
}

if(gameWon){
ctx.font="38px Arial";
ctx.fillText("Eres el amor más bonito que llegó a mi vida,",canvas.width/2-450,canvas.height/2);
ctx.fillText("mi razón favorita para sonreír cada día ❤️",canvas.width/2-450,canvas.height/2+50);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
